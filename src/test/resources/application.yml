spring:
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false
  autoconfigure:
    exclude:
      - org.springframework.cloud.netflix.eureka.EurekaClientAutoConfiguration
  datasource:
    url: jdbc:h2:mem:theatre_management;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  sql:
    init:
      mode: never

app:
  jwt:
    secret: change-this-secret-to-a-long-random-string
  clients:
    layout-service:
      base-url: http://layout-service

eureka:
  client:
    enabled: false
